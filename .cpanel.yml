---
deployment:
  tasks:
    - export DEPLOYPATH=/home/uzn9f7vk9mpx/public_html/
    - /bin/cp -R "$TRAVIS_BUILD_DIR"/. "$DEPLOYPATH"
    - cd "$DEPLOYPATH" && /usr/local/bin/composer install --no-dev --optimize-autoloader --no-interaction
    - cd "$DEPLOYPATH" && /usr/local/bin/php artisan migrate --force
    - cd "$DEPLOYPATH" && /usr/local/bin/php artisan optimize
    - cd "$DEPLOYPATH" && /bin/chmod -R 755 storage bootstrap/cache
