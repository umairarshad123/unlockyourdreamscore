name: Deploy to cPanel

# Runs on every push to main. It tells cPanel (over its HTTPS API) to
# pull the latest commit and run the .cpanel.yml deploy tasks
# (composer install -> php artisan migrate -> php artisan optimize).
# No SSH/shell access required.

on:
  push:
    branches: [ main ]
  workflow_dispatch:   # lets you trigger a deploy manually from the Actions tab

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to cPanel
        uses: pinkasey/cpanel-deploy-action@v1.0.0
        with:
          hostname: 'https://p3plzcpnl509006.prod.phx3.secureserver.net'
          cPanelApiPort: 2083
          cpanel_username: 'uzn9f7vk9mpx'
          cpanel_token: ${{ secrets.CPANEL_TOKEN }}
          repository_root: '/home/uzn9f7vk9mpx/public_html'
          updateRepository: true
          branch: main
